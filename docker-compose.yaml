networks:
  network:
    driver: bridge

volumes:
  db-storage:
  files:
  logs:

services:
  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-storage:/var/lib/postgresql/data
    networks:
      - network

  backend:
    build: ./backend/
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 2s
      retries: 3
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - files:/backend/storage
      - logs:/backend/logs
    networks:
      - network

  gateaway:
    build: ./nginx/
    restart: always
    ports:
      - 80:80
    depends_on:
      - backend
    networks:
      - network