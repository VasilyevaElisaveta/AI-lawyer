version: "3.9"

services:
  inference-server:
    env_file:
      - .env
    build:
      context: ../..
      dockerfile: src/inference_server/Dockerfile
    container_name: ai-lawyer-inference-server
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - LLM_MODEL=GigaChat
      - SBER_AUTH=${SBER_AUTH:-}
      - DEBUG=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/chat/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-lawyer-network
    restart: unless-stopped

networks:
  ai-lawyer-network:
    driver: bridge
