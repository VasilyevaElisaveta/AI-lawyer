services:
  inference-server:
    env_file:
      - .env
    build:
      context: .
      dockerfile: ./Dockerfile
      additional_contexts:
        logger_lib: ../libs/logger
    container_name: ai-lawyer-inference-server
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/chat/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-lawyer-network

networks:
  ai-lawyer-network:
    driver: bridge